name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build wasm (single-threaded, with PDF)
        run: wasm-pack build --target web --release --no-default-features --features pdf

      - name: Build TypeScript frontend (bundles the wasm glue in)
        run: |
          cp pkg/sticker_packer.js pkg/sticker_packer.d.ts pkg/sticker_packer_bg.wasm web/
          cd web
          bun install --frozen-lockfile
          bun run typecheck
          bun run build

      - name: Assemble static site
        # Content-hash app.js / worker.js / *.wasm and rewrite their references, so each deploy has
        # fresh URLs and the CDN can't serve a stale engine. index.html keeps its stable name.
        run: bun web/hash-assets.mjs web site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
